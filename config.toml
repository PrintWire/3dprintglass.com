baseURL = "https://3dprintglass.com/"
languageCode = "en-us"
title = "3D Print Glass"

[outputs]
  home = ["HTML", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Only these params are consumed by rendered output (layouts/_default/baseof.html,
# the /articles/ list page, and layouts/index.json). The homepage is served from
# static/index.html, which Hugo copies over its own generated index.html.
[params]
siteName    = "3D Print Glass"
description = "Fused silica, borosilicate, and optical glass additive manufacturing — research, suppliers, and industry coverage."
logoHtml    = '3D&nbsp;PRINT&nbsp;<span class="ed-logo-accent">GLASS</span>'
ogImage     = "/images/01_hero_silica_lattice.png"
heroImage   = "images/01_hero_silica_lattice.png"
